component_name: capif_backoffice
metadata:
  family: general
  maintainers: 
    - Jesus Macias Portela <jesus.maciasportela@telefonica.com>
  version: 0.0.1
  depends: 
    - capif (>= 0.0.1)
  short_description: This is a web portal to manage CAPIF instance.
